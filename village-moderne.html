<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village Moderne & Stands | FENACI 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800">
    <!-- NAVIGATION -->
    <nav class="bg-white shadow-sm border-b border-gray-200 py-4 px-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center text-xs font-bold uppercase">
            <a href="index.html" class="text-green-600 text-lg font-black">FENACI 2026</a>
            <div class="space-x-4">
                <a href="index.html" class="text-gray-600">Accueil</a>
                <a href="village-ancestral.html" class="text-gray-600">Village Ancestral</a>
                <a href="village-moderne.html" class="text-orange-500">Village Moderne</a>
                <a href="votes.html" class="text-gray-600">Votes</a>
                <a href="b2b.html" class="text-gray-600">Espace B2B</a>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-10">
        <div class="border-b border-blue-200 pb-4 mb-8">
            <span class="text-blue-600 text-xs font-bold uppercase tracking-wider"><i class="fa-solid fa-microchip mr-1"></i> Agrotech & Machinisme</span>
            <h1 class="text-2xl md:text-3xl font-black text-gray-900 uppercase mt-1">Le Village Moderne & Réservation de Stands</h1>
        </div>

        <!-- FORMULAIRE DE RÉSERVATION AVEC SIMULATEUR INTEGRÉ -->
        <div class="bg-white border border-gray-200 rounded-lg shadow-sm p-6 md:p-8">
            <h2 class="text-sm font-bold uppercase tracking-wider text-gray-700 mb-4 border-b pb-2"><i class="fa-solid fa-store mr-2"></i>Dossier Unique d'Inscription Exposant</h2>
            
            <form id="standForm" onchange="calculatePrice()" class="space-y-6">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] font-bold uppercase text-gray-600 mb-1">Nom de l'Entreprise / Coopérative</label>
                        <input type="text" required placeholder="Ex: Sifca, OCP..." class="w-full bg-white border border-gray-300 text-xs px-3 py-2 rounded focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold uppercase text-gray-600 mb-1">Téléverser votre Logo Officiel</label>
                        <input type="file" accept="image/*" required class="w-full bg-white border border-gray-300 text-xs px-2 py-1.5 rounded text-gray-500 file:mr-2 file:py-0.5 file:px-2 file:rounded file:border-0 file:text-[10px] file:font-semibold file:bg-blue-50 file:text-blue-700">
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-bold uppercase text-gray-600 mb-1">Sélectionner la Formule d'Exposition</label>
                    <select id="standOption" required class="w-full bg-white border border-gray-300 text-xs px-3 py-2 rounded outline-none focus:border-blue-500">
                        <option value="A" data-price="250000">Option A - Stand Standard (9m²) — 250 000 F CFA</option>
                        <option value="B" data-price="500000">Option B - Stand Premium (18m²) — 500 000 F CFA</option>
                        <option value="C" data-price="1200000">Option C - Pavillon Industriel (50m²) — 1 200 000 F CFA</option>
                    </select>
                </div>

                <!-- BLOC CASHLESS INTERACTIF -->
                <div class="bg-blue-50 border border-blue-200 p-4 rounded-md flex flex-col sm:flex-row items-center justify-between gap-4">
                    <div>
                        <span class="text-[10px] font-bold text-blue-900 uppercase block">Facture Estimative Digitale (Net à payer)</span>
                        <div id="totalPriceDisplay" class="text-xl font-black text-blue-700 font-mono mt-0.5">250 000 F CFA</div>
                    </div>
                    <div class="text-right text-[10px] font-medium text-gray-500">
                        <i class="fa-solid fa-wallet text-blue-600 text-base mr-1.5 align-middle"></i> Passerelle intégrée : Mobile Money, Wave & Visa.
                    </div>
                </div>

                <div class="flex justify-end">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs uppercase px-6 py-2.5 rounded shadow transition-all">Soumettre et générer le bon de commande</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        // Simulateur automatique
        function calculatePrice() {
            const select = document.getElementById("standOption");
            const price = parseInt(select.options[select.selectedIndex].getAttribute("data-price"));
            document.getElementById("totalPriceDisplay").innerText = price.toLocaleString('fr-FR') + " F CFA";
        }
    </script>
</body>
</html>
